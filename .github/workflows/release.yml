name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS ${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            goarch: amd64
          - runner: macos-latest
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: brew install sdl3 mupdf go pkg-config dylibbundler

      - name: Set up environment
        run: |
          echo "DYLD_LIBRARY_PATH=$(brew --prefix sdl3)/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Create MuPDF pkg-config file
        run: |
          mkdir -p "$PWD/pkgconfig"

          MUPDF_PREFIX="$(brew --prefix mupdf)"
          MUPDF_VERSION="$(brew list --versions mupdf | awk '{print $2}')"

          cat > "$PWD/pkgconfig/mupdf.pc" <<EOF
          prefix=${MUPDF_PREFIX}
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: mupdf
          Description: MuPDF PDF rendering library
          Version: ${MUPDF_VERSION}
          Libs: -L\${libdir} -lmupdf -lmupdf-third -lm
          Cflags: -I\${includedir}
          EOF

          echo "PKG_CONFIG_PATH=$PWD/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl3

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/gopdf .

      - name: Package
        run: |
          name="gopdf-${GITHUB_REF_NAME}-darwin-${{ matrix.goarch }}"
          app="GoPDF.app"

          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources" "$app/Contents/Frameworks"
          cp dist/gopdf "$app/Contents/MacOS/GoPDF"

          cat > "$app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>GoPDF</string>
            <key>CFBundleExecutable</key>
            <string>GoPDF</string>
            <key>CFBundleIconFile</key>
            <string>gopdf</string>
            <key>CFBundleIdentifier</key>
            <string>app.gopdf.viewer</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>GoPDF</string>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeExtensions</key>
                <array>
                  <string>pdf</string>
                </array>
                <key>CFBundleTypeIconFile</key>
                <string>gopdf</string>
                <key>CFBundleTypeName</key>
                <string>PDF Document</string>
                <key>CFBundleTypeRole</key>
                <string>Viewer</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>com.adobe.pdf</string>
                </array>
              </dict>
            </array>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.productivity</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          iconset="gopdf.iconset"
          mkdir -p "$iconset"
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" assets/gopdf.png --out "$iconset/icon_${size}x${size}.png"
            sips -z "$((size * 2))" "$((size * 2))" assets/gopdf.png --out "$iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$iconset" -o "$app/Contents/Resources/gopdf.icns"

          dylibbundler -od -b -x "$app/Contents/MacOS/GoPDF" -d "$app/Contents/Frameworks" -p "@executable_path/../Frameworks"
          if otool -L "$app/Contents/MacOS/GoPDF" "$app"/Contents/Frameworks/*.dylib | grep -E '(/opt/homebrew|/usr/local)/'; then
            exit 1
          fi
          "$app/Contents/MacOS/GoPDF" -v
          codesign --force --deep --sign - "$app"

          mkdir -p "${name}.dmgroot"
          cp -R "$app" "${name}.dmgroot/"
          ln -s /Applications "${name}.dmgroot/Applications"
          hdiutil create -volname "GoPDF" -srcfolder "${name}.dmgroot" -ov -format UDZO "${name}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gopdf-${{ github.ref_name }}-darwin-${{ matrix.goarch }}
          path: gopdf-${{ github.ref_name }}-darwin-${{ matrix.goarch }}.dmg
          if-no-files-found: error

  windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-mupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl3

      - name: Compile Windows resources
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            [0-9]*.[0-9]*.[0-9]*)
              version_commas="$(printf '%s' "$version" | awk -F. '{ printf "%d,%d,%d,0", $1, $2, $3 }')"
              ;;
            *)
              version="0.0.0"
              version_commas="0,0,0,0"
              ;;
          esac

          cat > gopdf.rc <<EOF
          #include <winver.h>

          IDI_ICON1 ICON "assets/gopdf.ico"
          1 RT_MANIFEST "assets/windows/gopdf.exe.manifest"

          VS_VERSION_INFO VERSIONINFO
          FILEVERSION ${version_commas}
          PRODUCTVERSION ${version_commas}
          FILEFLAGSMASK 0x3fL
          FILEFLAGS 0x0L
          FILEOS 0x40004L
          FILETYPE 0x1L
          FILESUBTYPE 0x0L
          BEGIN
            BLOCK "StringFileInfo"
            BEGIN
              BLOCK "040904b0"
              BEGIN
                VALUE "CompanyName", "GoPDF\\0"
                VALUE "FileDescription", "GoPDF PDF Viewer\\0"
                VALUE "FileVersion", "${version}\\0"
                VALUE "InternalName", "gopdf\\0"
                VALUE "OriginalFilename", "gopdf.exe\\0"
                VALUE "ProductName", "GoPDF\\0"
                VALUE "ProductVersion", "${version}\\0"
              END
            END
            BLOCK "VarFileInfo"
            BEGIN
              VALUE "Translation", 0x409, 1200
            END
          END
          EOF

          windres -O coff -o rsrc_windows_amd64.syso gopdf.rc

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -H=windowsgui -X main.version=${GITHUB_REF_NAME}" -o dist/gopdf.exe .

      - name: Package
        run: |
          name="gopdf-${GITHUB_REF_NAME}-windows-amd64"
          mkdir -p "$name"
          cp dist/gopdf.exe "$name/"
          ldd dist/gopdf.exe \
            | awk '/\/ucrt64\/bin\// { print $3 }' \
            | sort -u \
            | xargs -r cp -t "$name/"
          cp /ucrt64/bin/SDL3.dll "$name/"
          powershell -NoProfile -Command "\$env:PATH='${PWD}/${name};C:/msys64/ucrt64/bin;C:/msys64/usr/bin;' + \$env:PATH; \$p = Start-Process -FilePath '${PWD}/${name}/gopdf.exe' -ArgumentList '-v' -Wait -PassThru; exit \$p.ExitCode"
          powershell -NoProfile -Command "Compress-Archive -Path '${name}' -DestinationPath '${name}.zip'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gopdf-${{ github.ref_name }}-windows-amd64
          path: gopdf-${{ github.ref_name }}-windows-amd64.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
