name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsdl2-dev libmupdf-dev libfreetype-dev libharfbuzz-dev libjbig2dec0-dev libjpeg-dev libopenjp2-7-dev zlib1g-dev

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl2

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native dependencies
        run: |
          brew install pkg-config sdl2 mupdf
          echo "PKG_CONFIG_PATH=$(brew --prefix mupdf)/lib/pkgconfig:$(brew --prefix freetype)/lib/pkgconfig:$(brew --prefix harfbuzz)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl2

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-mupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl2

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
