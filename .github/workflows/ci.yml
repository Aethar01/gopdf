name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - README.md
  pull_request:
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  linux:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: pacman -Syu --noconfirm git go pkgconf sdl3 libmupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl3

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: brew install sdl3 mupdf go pkg-config

      - name: Set up environment
        run: |
          echo "DYLD_LIBRARY_PATH=$(brew --prefix sdl3)/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"


      - name: Create MuPDF pkg-config file
        run: |
          mkdir -p "$PWD/pkgconfig"

          MUPDF_PREFIX="$(brew --prefix mupdf)"
          MUPDF_VERSION="$(brew list --versions mupdf | awk '{print $2}')"

          cat > "$PWD/pkgconfig/mupdf.pc" <<EOF
          prefix=${MUPDF_PREFIX}
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: mupdf
          Description: MuPDF PDF rendering library
          Version: ${MUPDF_VERSION}
          Libs: -L\${libdir} -lmupdf -lmupdf-third -lm
          Cflags: -I\${includedir}
          EOF

          echo "PKG_CONFIG_PATH=$PWD/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-mupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl3

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
