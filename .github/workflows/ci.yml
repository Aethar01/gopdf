name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: pacman -Syu --noconfirm git go pkgconf sdl2-compat libmupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl2

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install with Homebrew formula
        run: brew install --HEAD Aethar01/homebrew-gopdf/gopdf

      - name: Test installed binary
        run: gopdf -v

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-mupdf

      - name: Verify native dependencies
        run: pkg-config --cflags --libs mupdf sdl2

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
